<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Turfe</title>
  <link rel="stylesheet" href="dinamica-turfe.css">
</head>

<body>
  <div class="geral">
    <div class="inicio" id="inicio">
      <div class="card_inicio">
        <h1>PixelTurfe</h1>
        <h2>Corrida de Cavalos</h2>
        <button onclick="trocar()">Começar</button>
      </div>
    </div>
    <div class="game" id="game">
      <div class="game_card">
      <h1 for="">Vamos iniciar nossa corrida</h1>
      <input type="text" id="ipt_qtd_cavalos" placeholder="Quantidade de Cavalos" />
      <input type="text" id="ipt_qtd_voltas" placeholder="Quantidade de Voltas" />
      <button onclick="iniciar()">Dar a Largada</button>
      <span id="resultado"></span>
    </div>
  </div>
</body>

</html>
<script>
  let cavalos = [];
  let qtd_voltas = 7;
  let vitoria_maxima

  async function iniciar() {
    resultado.innerHTML = "";

    let qtd_cavalos = Number(ipt_qtd_cavalos.value);

    if (qtd_cavalos < 2 || qtd_cavalos > 6) {
      alert("A quantidade de cavalos deve ser entre 2 e 6.");
      return;
    }

    cavalos = [];

    for (let i = 0; i < qtd_cavalos; i++) {
      let nome_cavalo = prompt(`Digite o nome do cavalo ${i + 1}:`);

      cavalos.push({
        numero: i + 1,
        nome: nome_cavalo,
        tempo: [],
      });
    }

    qtd_voltas = Number(ipt_qtd_voltas.value);

    sortearTempo();
    await exibirTodos();
    comparar();
  }

  function sortearTempo() {
    for (let i = 0; i < cavalos.length; i++) {
      for (let j = 0; j < qtd_voltas; j++) {
        let tempo_sorteado = (Math.random() * 2 + 7).toFixed(2);

        let tempo_sorteado_num = Number(tempo_sorteado);

        cavalos[i].tempo.push(tempo_sorteado_num);
      }
    }
  }

let ranking = [];

  function comparar() {
    for (let i = 0; i < cavalos.length; i++) {
      let soma_tempo = 0;

      for (let j = 0; j < cavalos[i].tempo.length; j++) {
        soma_tempo += cavalos[i].tempo[j];
      }

      ranking.push({
        nome: cavalos[i].nome,
        soma_tempo: soma_tempo,
      });
    }

    for (let i = 0; i < ranking.length; i++) {
      for (let j = 0; j < ranking.length - 1; j++) {
        if (ranking[j].soma_tempo > ranking[j + 1].soma_tempo) {
          let temp = ranking[j];
          ranking[j] = ranking[j + 1];
          ranking[j + 1] = temp;
        }
      }
    }

    

    resultado.innerHTML += `
      <br><br>
      <b>Vencedor:</b> ${ranking[0].nome}
      <br><br>
      <button onclick="exibirRanking()" class="btn-podio">Pódio</button>
    `;

    vitoria_maxima = ranking[0].nome
    console.log(vitoria_maxima)

    
  }

  function exibirRanking() {
    resultado.innerHTML = "";

    const lugares = [
        { classe: "segundo",  label: "2º", indice: 1 },
        { classe: "primeiro", label: "1º", indice: 0 },
        { classe: "terceiro", label: "3º", indice: 2 },
    ];

    let html = `<div class="podio_container">`;

    for (let i = 0; i < lugares.length; i++) {
        const cavalo = ranking[lugares[i].indice];

        console.log(cavalo.imagem);
        
        const nomeImagem = cavalo ? `
            <span class="podio_nome">${cavalo.nome}</span>
            <img class="podio_imagem" src="imagens/cavalo${lugares[i].indice + 1}.png">
        ` : "";

        html += `
            <div class="podio_lugar">
                <div class="podio_info">${nomeImagem}</div>
                <div class="podio_plataforma ${lugares[i].classe}">${lugares[i].label}</div>
            </div>
        `;
    }

    html += `</div>`;
    resultado.innerHTML = html;

    resultado.innerHTML += `<button onclick="location.reload()" class="btn-reload">Jogar de novo</button>`
}

   async function exibirTodos() {
    const pausa = (ms) => new Promise(resolve => setTimeout(resolve, ms))

    for (let j = 0; j < qtd_voltas; j++) {
      
      resultado.innerHTML += `
        <br>
        Volta ${String(j + 1).padStart(2, "0")}
        <br>
      `;

      let acumulados = [];

      for (let i = 0; i < cavalos.length; i++) {
        let tempo_sorteado = cavalos[i].tempo[j];

        let tempo_acumulado = 0;

        for (let k = 0; k <= j; k++) {
          tempo_acumulado += cavalos[i].tempo[k];
        }

        acumulados.push({
          nome: cavalos[i].nome,
          tempo_acumulado: tempo_acumulado,
        });

        resultado.innerHTML += `
          Cavalo ${cavalos[i].nome} -
          ${tempo_sorteado.toFixed(2)} -
          ${tempo_acumulado.toFixed(2)}
          <br>
        `;
      }

      let menor_acumulado = 1000;
      let segundo_menor_acumulado = 1000;
      let nome_lider = "";

      for (let i = 0; i < acumulados.length; i++) {
        if (acumulados[i].tempo_acumulado < menor_acumulado) {
          segundo_menor_acumulado = menor_acumulado;
          menor_acumulado = acumulados[i].tempo_acumulado;
          nome_lider = acumulados[i].nome;
        } else if (acumulados[i].tempo_acumulado < segundo_menor_acumulado) {
          segundo_menor_acumulado = acumulados[i].tempo_acumulado;
        }
      }

      let diferenca = segundo_menor_acumulado - menor_acumulado;

      resultado.innerHTML += `
        Líder: ${nome_lider} -
        Diferença para o 2º: ${diferenca.toFixed(2)}
        <br>
      `;

      await pausa(500)
    }
  }

  function trocar() {
    inicio.style.display = "none"
    game.style.display = "flex"
  }

</script>
